<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — ChatBotPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="glow"></div>
      <div class="mark"><i class="ph-fill ph-hand-waving"></i></div>
      <h1>Hola de <em>nuevo</em></h1>
      <p>Entra a tu panel para ver tus pedidos del día, tus ventas y administrar tu menú.</p>
      <div class="feats">
        <div class="feat"><span class="fi"><i class="ph-bold ph-chart-pie-slice"></i></span><span>Reportes claros de ventas y pedidos</span></div>
        <div class="feat"><span class="fi"><i class="ph-bold ph-hamburger"></i></span><span>Administra tu menú en segundos</span></div>
        <div class="feat"><span class="fi"><i class="ph-bold ph-lock-key"></i></span><span>Información protegida con cifrado</span></div>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <div class="logo"><span class="dot"><i class="ph-fill ph-robot"></i></span> ChatBotPro</div>
        <h2>Iniciar sesión</h2>
        <p class="sub">Accede al panel de tu restaurante.</p>
        <div class="error-box" id="error"><i class="ph-fill ph-warning-circle"></i><span id="errorMsg"></span></div>
        <form id="loginForm">
          <div class="field">
            <label><i class="ph-bold ph-user"></i> Usuario</label>
            <input type="text" id="username" autocomplete="username" required />
          </div>
          <div class="field">
            <label><i class="ph-bold ph-lock-key"></i> Contraseña</label>
            <input type="password" id="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary btn-block" type="submit" id="btn"><i class="ph-bold ph-sign-in"></i> Entrar</button>
        </form>
        <p class="alt">¿No tienes cuenta? <a href="/register">Regístrate gratis</a></p>
      </div>
    </div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('error');
      errBox.classList.remove('show');
      const btn = document.getElementById('btn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        location.href = '/app';
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        errBox.classList.add('show');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
