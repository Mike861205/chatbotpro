<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Haz tu pedido</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="icon" type="image/png" href="/static/chatbotpro100.png" />
  <style>
    :root { --primary: #ff6b35; --ink: #171c2e; --ease: cubic-bezier(0.22, 1, 0.36, 1); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(160deg, #e9ecf5, #dfe4f0);
      height: 100dvh; display: flex; justify-content: center; align-items: center;
    }
    .chat-app {
      width: 100%; max-width: 460px; height: 100dvh; display: flex; flex-direction: column;
      background: #f0f2f8; overflow: hidden; position: relative;
    }
    @media (min-width: 520px) {
      .chat-app { height: min(94dvh, 880px); border-radius: 30px; box-shadow: 0 30px 80px rgba(15,18,32,0.35); }
    }
    /* ── Header ── */
    .chat-header {
      background:
        radial-gradient(420px 200px at 90% -60%, color-mix(in srgb, var(--primary) 45%, transparent), transparent 70%),
        linear-gradient(150deg, #171c2e, #232a45);
      color: #fff; padding: 16px 18px; display: flex; align-items: center; gap: 13px; flex-shrink: 0; z-index: 5;
    }
    .chat-header .logo {
      width: 48px; height: 48px; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 55%, #ffc9a8));
      display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 6px 18px color-mix(in srgb, var(--primary) 45%, transparent);
    }
    .chat-header .logo img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header h1 { font-size: 16.5px; font-weight: 800; letter-spacing: -0.2px; }
    .chat-header .status { font-size: 12px; color: #9aa3c0; display: flex; align-items: center; gap: 6px; margin-top: 2px; font-weight: 600; }
    .chat-header .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; animation: pulse 2s infinite; }
    @keyframes pulse { 50% { opacity: 0.55; } }
    .chat-header .meta { flex: 1; min-width: 0; }
    /* ── Cart pill ── */
    .cart-bar {
      display: none; position: absolute; left: 14px; right: 14px; top: 86px; z-index: 6;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 999px; padding: 9px 9px 9px 18px;
      box-shadow: 0 10px 30px rgba(15,18,32,0.16);
      justify-content: space-between; align-items: center; gap: 10px;
      animation: slideDown 0.35s var(--ease);
    }
    .cart-bar.bump {
      animation: cartBump 0.34s var(--ease);
    }
    @keyframes cartBump {
      0% { transform: translateY(0) scale(1); }
      35% { transform: translateY(-2px) scale(1.02); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } }
    .cart-bar.show { display: flex; }
    .cart-bar .ci { font-size: 13px; font-weight: 800; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .cart-bar .ci i { color: var(--primary); font-size: 17px; }
    .cart-bar .delta {
      margin-left: 2px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 6px 14px rgba(34, 197, 94, 0.35);
      animation: deltaPop 0.9s var(--ease);
    }
    @keyframes deltaPop {
      0% { opacity: 0; transform: translateY(6px) scale(0.85); }
      30% { opacity: 1; transform: translateY(-2px) scale(1.04); }
      100% { opacity: 0; transform: translateY(-12px) scale(0.95); }
    }
    .cart-bar button {
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #ffb088));
      color: #fff; border: none; border-radius: 999px; padding: 9px 18px; font-weight: 800; font-size: 12.5px;
      cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px;
      box-shadow: 0 5px 14px color-mix(in srgb, var(--primary) 40%, transparent);
      transition: transform 0.15s var(--ease);
    }
    .cart-bar button.bump { animation: cartBtnPulse 0.34s var(--ease); }
    @keyframes cartBtnPulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .cart-bar button:active { transform: scale(0.95); }
    .chat-stage {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    /* ── Messages ── */
    .messages {
      height: 100%;
      overflow-y: auto;
      padding: 20px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      position: relative;
      z-index: 1;
    }
    .floating-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.12;
      z-index: 0;
    }
    .floating-icon {
      position: absolute;
      font-size: 64px;
      opacity: 0.5;
      user-select: none;
      animation: float 6s ease-in-out infinite;
    }
    .floating-icon:nth-child(1) { left: 8%; top: 10%; animation-delay: 0s; animation-duration: 7.2s; }
    .floating-icon:nth-child(2) { right: 12%; top: 15%; animation-delay: 1s; animation-duration: 8.1s; }
    .floating-icon:nth-child(3) { left: 15%; bottom: 20%; animation-delay: 2s; animation-duration: 6.8s; }
    .floating-icon:nth-child(4) { right: 8%; bottom: 15%; animation-delay: 0.5s; animation-duration: 7.5s; }
    .floating-icon:nth-child(5) { left: 20%; top: 40%; animation-delay: 1.5s; animation-duration: 6.5s; }
    .floating-icon:nth-child(6) { right: 18%; top: 50%; animation-delay: 2.5s; animation-duration: 7.8s; }
    .floating-icon:nth-child(7) { left: 10%; bottom: 30%; animation-delay: 3s; animation-duration: 8s; }
    .floating-icon:nth-child(8) { right: 5%; top: 35%; animation-delay: 1.2s; animation-duration: 6.9s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-15px) rotate(2deg); }
      50% { transform: translateY(-8px) rotate(-1deg); }
      75% { transform: translateY(-12px) rotate(1deg); }
    }
    .msg {
      max-width: 84%; padding: 12px 16px; border-radius: 20px; font-size: 14.5px; line-height: 1.55;
      white-space: pre-wrap; word-wrap: break-word; animation: popIn 0.3s var(--ease);
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } }
    .msg.bot { background: #fff; border-bottom-left-radius: 6px; align-self: flex-start; box-shadow: 0 2px 8px rgba(15,18,32,0.06); }
    .msg.user {
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 72%, #ff9d6b));
      color: #fff; border-bottom-right-radius: 6px; align-self: flex-end;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--primary) 35%, transparent);
    }
    .msg b { font-weight: 800; }
    .msg .order-note-highlight {
      display: inline-block;
      margin-top: 6px;
      font-size: 16.5px;
      font-weight: 900;
      letter-spacing: -0.15px;
      color: #111827;
      background: #fff4dc;
      border: 1px solid #ffd08a;
      border-radius: 10px;
      padding: 5px 9px;
    }
    /* ── Product cards ── */
    .prods { display: flex; flex-direction: column; gap: 9px; align-self: stretch; animation: popIn 0.3s var(--ease); }
    .prod {
      background: #fff; border-radius: 18px; padding: 11px 13px; display: flex; gap: 13px;
      align-items: center; box-shadow: 0 2px 8px rgba(15,18,32,0.06);
      transition: transform 0.18s var(--ease), box-shadow 0.18s; border: 1.5px solid transparent;
    }
    .prod:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 8px 22px rgba(15,18,32,0.1); }
    .prod:active { transform: scale(0.98); }
    .prod .pimg {
      width: 60px; height: 60px; border-radius: 15px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 12%, #fff), color-mix(in srgb, var(--primary) 5%, #fff));
      display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden; flex-shrink: 0;
      color: color-mix(in srgb, var(--primary) 65%, #fff);
    }
    .prod .pimg img { width: 100%; height: 100%; object-fit: cover; }
    .prod .pinfo { flex: 1; min-width: 0; }
    .prod .pname { font-weight: 800; font-size: 14px; letter-spacing: -0.1px; }
    .prod .pdesc { font-size: 12px; color: #8b91a6; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-top: 2px; }
    .prod .pright { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }
    .prod .pprice { font-weight: 800; color: var(--primary); font-size: 14.5px; }
    .prod .qty-ctl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f5f7fc;
      border: 1px solid #dfe4f2;
      border-radius: 999px;
      padding: 3px;
    }
    .prod .qty-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: transform .14s var(--ease), background .14s var(--ease), color .14s var(--ease);
    }
    .prod .qty-btn.plus { background: color-mix(in srgb, var(--primary) 16%, #fff); color: var(--primary); }
    .prod .qty-btn.minus { background: #eef2f9; color: #7a849f; }
    .prod .qty-btn:hover { transform: scale(1.08); }
    .prod .qty-val {
      min-width: 22px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      color: #4f5a76;
    }
    .prod .qty-send {
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #ffb088));
      cursor: pointer;
      transition: transform .14s var(--ease), opacity .14s var(--ease);
    }
    .prod .qty-send:hover { transform: scale(1.04); }
    .prod .qty-send:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .bulk-send-wrap { display: flex; justify-content: flex-end; margin-top: 6px; }
    .bulk-send-btn {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #ffb088));
      cursor: pointer;
      transition: transform .14s var(--ease), opacity .14s var(--ease);
      box-shadow: 0 6px 14px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .bulk-send-btn:hover { transform: scale(1.03); }
    .bulk-send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    /* ── Quick replies ── */
    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      gap: 9px;
      align-self: stretch;
      width: 100%;
      animation: popIn 0.35s var(--ease);
    }
    .opt {
      position: relative;
      overflow: hidden;
      background: linear-gradient(140deg, color-mix(in srgb, var(--primary) 10%, #fff), #ffffff 62%);
      border: 1.5px solid color-mix(in srgb, var(--primary) 34%, #dce3f4);
      color: color-mix(in srgb, var(--primary) 88%, #ffffff);
      border-radius: 14px;
      min-height: 42px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.15px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-shadow: 0 0 12px color-mix(in srgb, var(--primary) 36%, transparent);
      transition: all 0.18s var(--ease);
      box-shadow: 0 3px 10px rgba(15,18,32,0.07), inset 0 1px 0 rgba(255,255,255,0.78);
    }
    .opt::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.42), transparent 62%);
      opacity: 0;
      transition: opacity 0.18s var(--ease);
      pointer-events: none;
    }
    .opt:nth-child(3n+1) {
      background: linear-gradient(140deg, color-mix(in srgb, var(--primary) 8%, #fff), #ffffff 60%);
    }
    .opt:nth-child(3n+2) {
      background: linear-gradient(140deg, color-mix(in srgb, var(--primary) 12%, #fff), #ffffff 62%);
    }
    .opt:nth-child(3n) {
      background: linear-gradient(140deg, color-mix(in srgb, var(--primary) 16%, #fff), #ffffff 64%);
    }
    .opt:hover {
      background: linear-gradient(140deg, color-mix(in srgb, var(--primary) 22%, #fff), color-mix(in srgb, var(--primary) 12%, #fff));
      color: color-mix(in srgb, var(--primary) 96%, #fff);
      border-color: color-mix(in srgb, var(--primary) 56%, #bfc9e2);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px color-mix(in srgb, var(--primary) 28%, transparent), inset 0 1px 0 rgba(255,255,255,0.82);
    }
    .opt:hover::after { opacity: 1; }
    .opt:active { transform: scale(0.96); }
    @media (max-width: 430px) {
      .options { grid-template-columns: 1fr 1fr; }
      .opt { font-size: 12.5px; padding: 9px 12px; }
    }
    /* ── WhatsApp CTA ── */
    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: linear-gradient(135deg, #1faa53, #25d366); color: #fff; border-radius: 18px; padding: 14px 18px;
      font-weight: 800; font-size: 14.5px; text-decoration: none; align-self: stretch;
      box-shadow: 0 8px 24px rgba(37,211,102,0.4); animation: popIn 0.35s var(--ease);
      transition: transform 0.15s var(--ease);
    }
    .wa-btn:active { transform: scale(0.97); }
    .wa-btn i { font-size: 20px; }
    /* ── Typing ── */
    .typing { display: flex; gap: 5px; padding: 14px 18px; background: #fff; border-radius: 20px; border-bottom-left-radius: 6px; align-self: flex-start; box-shadow: 0 2px 8px rgba(15,18,32,0.06); }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #c2c8d8; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink { 0%, 70%, 100% { opacity: 0.3; transform: translateY(0); } 35% { opacity: 1; transform: translateY(-3px); } }
    /* ── Input ── */
    .input-bar {
      display: flex; gap: 10px; padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.75); backdrop-filter: blur(14px); flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.9);
    }
    .input-bar input {
      flex: 1; border: 1.5px solid transparent; border-radius: 999px; padding: 13px 19px; font-size: 14.5px;
      outline: none; background: #fff; box-shadow: 0 2px 10px rgba(15,18,32,0.07); font-family: inherit;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 14%, transparent); }
    .input-bar button {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #ffb088));
      color: #fff; font-size: 19px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 40%, transparent);
      transition: transform 0.15s var(--ease);
    }
    .input-bar button:hover { transform: scale(1.06); }
    .input-bar button:active { transform: scale(0.94); }
    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: #c9cede; border-radius: 99px; }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <div class="logo" id="bizLogo"><i class="ph-fill ph-storefront"></i></div>
      <div class="meta">
        <h1 id="bizName">Cargando…</h1>
        <div class="status"><span class="dot"></span> Asistente en línea · responde al instante</div>
      </div>
    </div>
    <div class="cart-bar" id="cartBar">
      <span class="ci"><i class="ph-fill ph-shopping-cart"></i><span id="cartInfo"></span></span>
      <button id="cartCheckout">Sería todo, gracias. <i class="ph-bold ph-arrow-right"></i></button>
    </div>
    <div class="chat-stage">
      <div class="floating-bg">
        <div class="floating-icon">🍕</div>
        <div class="floating-icon">💵</div>
        <div class="floating-icon">🛵</div>
        <div class="floating-icon">💻</div>
        <div class="floating-icon">🍔</div>
        <div class="floating-icon">📱</div>
        <div class="floating-icon">🥤</div>
        <div class="floating-icon">🍟</div>
      </div>
      <div class="messages" id="messages"></div>
    </div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Escribe un mensaje…" maxlength="500" autocomplete="off" />
      <button id="sendBtn" title="Enviar"><i class="ph-fill ph-paper-plane-tilt"></i></button>
    </div>
  </div>

  <script>
    const slug = location.pathname.split('/').pop();
    let sessionId = sessionStorage.getItem('cbp_session_' + slug) || null;
    let lastCartItemsCount = 0;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');

    function animateCartDelta(delta) {
      if (!delta || delta <= 0) return;
      const bar = document.getElementById('cartBar');
      const checkoutBtn = document.getElementById('cartCheckout');
      if (!bar) return;

      bar.classList.remove('bump');
      void bar.offsetWidth;
      bar.classList.add('bump');

      if (checkoutBtn) {
        checkoutBtn.classList.remove('bump');
        void checkoutBtn.offsetWidth;
        checkoutBtn.classList.add('bump');
      }

      const prevDelta = bar.querySelector('.delta');
      if (prevDelta) prevDelta.remove();
      const d = document.createElement('span');
      d.className = 'delta';
      d.textContent = `+${delta}`;
      bar.querySelector('.ci')?.appendChild(d);
      setTimeout(() => d.remove(), 900);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function md(s) {
      return esc(s)
        .replace(/\*([^*]+)\*/g, '<b>$1</b>')
        .replace(/<b>(🧾\s*Nota\s+del\s+pedido:[\s\S]*?)<\/b>/gi, '<span class="order-note-highlight"><b>$1</b></span>')
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
        .replace(/\n/g, '<br>');
    }
    function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function addMsg(text, who) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.innerHTML = md(text);
      messagesEl.appendChild(div);
      scrollDown();
    }

    function clearInteractive() {
      messagesEl.querySelectorAll('.options, .prods, .wa-btn').forEach((el) => el.remove());
    }

    async function shareLocation(triggerBtn) {
      if (!navigator.geolocation) {
        send('location_error', null);
        return;
      }

      if (triggerBtn) {
        triggerBtn.disabled = true;
        triggerBtn.textContent = 'Obteniendo ubicación…';
      }

      const getPosition = (opts) =>
        new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, opts);
        });

      const pickBetterPosition = (current, candidate) => {
        if (!current) return candidate;
        const currAcc = Number(current?.coords?.accuracy || Infinity);
        const nextAcc = Number(candidate?.coords?.accuracy || Infinity);
        return nextAcc < currAcc ? candidate : current;
      };

      const sendGeo = (pos) => {
        const lat = Number(pos?.coords?.latitude);
        const lng = Number(pos?.coords?.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          send('location_error', null);
          return;
        }
        const label = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        send(`geo:${lat},${lng}|${label}`, '📍 Ubicación compartida');
      };

      try {
        // Intento rápido para responder pronto al clic del cliente.
        let best = await getPosition({ enableHighAccuracy: false, timeout: 7000, maximumAge: 15000 });
        const quickAcc = Number(best?.coords?.accuracy || Infinity);

        // Si viene muy imprecisa, mejoramos con GPS más preciso.
        if (quickAcc > 120) {
          try {
            const retry = await getPosition({ enableHighAccuracy: true, timeout: 9000, maximumAge: 0 });
            best = pickBetterPosition(best, retry);
          } catch {
            // Si falla la mejora, usamos la mejor lectura disponible sin bloquear más.
          }
        }

        sendGeo(best);
      } catch {
        send('location_error', null);
      } finally {
        if (triggerBtn) {
          triggerBtn.disabled = false;
          triggerBtn.textContent = '📍 Compartir ubicación';
        }
      }
    }

    function onOption(o, triggerBtn = null) {
      if (o.value === 'share_location') return shareLocation(triggerBtn);
      send(o.value, o.label);
    }

    function showTyping() {
      const t = document.createElement('div');
      t.className = 'typing';
      t.id = 'typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(t);
      scrollDown();
    }
    function hideTyping() { document.getElementById('typing')?.remove(); }

    function renderReply(data) {
      hideTyping();
      (data.messages || []).forEach((m) => addMsg(m, 'bot'));

      if (data.products && data.products.length) {
        const wrap = document.createElement('div');
        wrap.className = 'prods';
        const pendingChanges = new Map();
        let bulkBtn = null;

        function updateBulkState() {
          if (!bulkBtn) return;
          bulkBtn.disabled = pendingChanges.size === 0;
        }

        data.products.forEach((p) => {
          const card = document.createElement('div');
          card.className = 'prod';
          const serverQty = Number(p.qty || 0);
          card.innerHTML = `
            <div class="pimg">${p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy">` : '<i class="ph ph-fork-knife"></i>'}</div>
            <div class="pinfo"><div class="pname">${esc(p.name)}</div><div class="pdesc">${esc(p.description || '')}</div></div>
            <div class="pright">
              <span class="pprice">${esc(p.priceLabel)}</span>
              <div class="qty-ctl" data-qty-wrap>
                <button class="qty-btn minus" type="button" data-dec="${p.id}" ${serverQty <= 0 ? 'disabled' : ''}><i class="ph-bold ph-minus"></i></button>
                <span class="qty-val">${serverQty}</span>
                <button class="qty-btn plus" type="button" data-inc="${p.id}"><i class="ph-bold ph-plus"></i></button>
                <button class="qty-send" type="button" data-send="${p.id}" disabled>Enviar</button>
              </div>
            </div>`;

          let draftQty = serverQty;
          const minusBtn = card.querySelector('[data-dec]');
          const sendBtn = card.querySelector('[data-send]');
          const qtyVal = card.querySelector('.qty-val');

          function redrawQty() {
            if (qtyVal) qtyVal.textContent = String(draftQty);
            if (minusBtn) minusBtn.disabled = draftQty <= 0;
            if (sendBtn) sendBtn.disabled = draftQty === serverQty;
            if (draftQty === serverQty) pendingChanges.delete(String(p.id));
            else pendingChanges.set(String(p.id), draftQty);
            updateBulkState();
          }

          card.querySelector('[data-inc]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (draftQty >= 50) return;
            draftQty += 1;
            redrawQty();
          });
          card.querySelector('[data-dec]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (draftQty <= 0) return;
            draftQty -= 1;
            redrawQty();
          });
          card.querySelector('[data-send]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            send(`prod_set_${p.id}_${draftQty}`, null);
          });
          redrawQty();
          wrap.appendChild(card);
        });

        const bulkWrap = document.createElement('div');
        bulkWrap.className = 'bulk-send-wrap';
        bulkBtn = document.createElement('button');
        bulkBtn.className = 'bulk-send-btn';
        bulkBtn.type = 'button';
        bulkBtn.textContent = 'Enviar todo';
        bulkBtn.disabled = true;
        bulkBtn.addEventListener('click', () => {
          if (!pendingChanges.size) return;
          const payload = Array.from(pendingChanges.entries())
            .map(([id, qty]) => `${id}-${qty}`)
            .join(',');
          send(`prod_apply_${payload}`, null);
        });
        bulkWrap.appendChild(bulkBtn);

        messagesEl.appendChild(wrap);
        messagesEl.appendChild(bulkWrap);
      }

      if (data.order && data.order.whatsappLink) {
        const a = document.createElement('a');
        a.className = 'wa-btn';
        a.href = data.order.whatsappLink;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = '<i class="ph-fill ph-whatsapp-logo"></i> Enviar mi pedido por WhatsApp';
        messagesEl.appendChild(a);
      }

      if (data.options && data.options.length) {
        const optionsRaw = Array.isArray(data.options) ? data.options.slice() : [];
        const grouped = {
          primary: [],
          categories: [],
          rest: [],
          cart: [],
          checkout: [],
        };
        optionsRaw.forEach((o) => {
          const value = String(o?.value || '');
          if (value === 'menu') grouped.primary.push(o);
          else if (value.startsWith('cat_')) grouped.categories.push(o);
          else if (value === 'cart') grouped.cart.push(o);
          else if (value === 'checkout') grouped.checkout.push(o);
          else grouped.rest.push(o);
        });
        grouped.categories.sort((a, b) =>
          String(a?.label || '').localeCompare(String(b?.label || ''), 'es', { sensitivity: 'base' })
        );
        const optionsOrdered = [
          ...grouped.primary,
          ...grouped.categories,
          ...grouped.rest,
          ...grouped.cart,
          ...grouped.checkout,
        ];

        const wrap = document.createElement('div');
        wrap.className = 'options';
        optionsOrdered.forEach((o) => {
          const b = document.createElement('button');
          b.className = 'opt';
          b.textContent = o.label;
          b.addEventListener('click', () => onOption(o, b));
          wrap.appendChild(b);
        });
        messagesEl.appendChild(wrap);
      }

      const bar = document.getElementById('cartBar');
      if (data.cart && data.cart.items.length) {
        const n = data.cart.items.reduce((s, it) => s + it.qty, 0);
        document.getElementById('cartInfo').textContent = `${n} producto${n > 1 ? 's' : ''} · ${data.cart.totalLabel}`;
        bar.classList.add('show');
        const delta = Math.max(0, n - lastCartItemsCount);
        animateCartDelta(delta);
        lastCartItemsCount = n;
      } else {
        bar.classList.remove('show');
        lastCartItemsCount = 0;
      }
      scrollDown();
    }

    async function send(value, displayLabel) {
      clearInteractive();
      if (displayLabel !== null) addMsg(displayLabel || value, 'user');
      showTyping();
      try {
        const res = await fetch(`/api/chat/${slug}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: value }),
        });
        const data = await res.json();
        if (data.sessionId) {
          sessionId = data.sessionId;
          sessionStorage.setItem('cbp_session_' + slug, sessionId);
        }
        renderReply(data);
      } catch {
        hideTyping();
        addMsg('Ups, hubo un problema de conexión. Intenta de nuevo 🙏', 'bot');
      }
    }

    document.getElementById('sendBtn').addEventListener('click', () => {
      const v = inputEl.value.trim();
      if (!v) return;
      inputEl.value = '';
      send(v);
    });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
    document.getElementById('cartCheckout').addEventListener('click', () => send('checkout', '✅ Sería todo, gracias.'));

    async function init() {
      try {
        const res = await fetch(`/api/chat/${slug}/info`);
        if (!res.ok) throw new Error();
        const info = await res.json();
        document.title = `${info.businessName} — Haz tu pedido`;
        document.getElementById('bizName').textContent = info.businessName;
        if (info.primaryColor) document.documentElement.style.setProperty('--primary', info.primaryColor);
        if (info.logo) document.getElementById('bizLogo').innerHTML = `<img src="${esc(info.logo)}" alt="">`;
        send('start', null);
      } catch {
        document.getElementById('bizName').textContent = 'Negocio no encontrado';
        addMsg('Esta liga no corresponde a ningún negocio activo. Verifica la dirección 🙏', 'bot');
      }
    }
    init();
  </script>
</body>
</html>
