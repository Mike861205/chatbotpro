<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperAdmin Login — ChatBotPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="icon" type="image/png" href="/static/chatbotpro100.png" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="glow"></div>
      <div class="mark"><i class="ph-fill ph-shield-check"></i></div>
      <h1>Panel <em>SuperAdmin</em></h1>
      <p>Administra tenants activos, por pagar e integra OpenAI y APIs de forma centralizada.</p>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <div class="logo"><span class="dot"><i class="ph-fill ph-crown"></i></span> ChatBotPro</div>
        <h2>SuperAdmin</h2>
        <p class="sub">Acceso exclusivo de plataforma.</p>
        <div class="error-box" id="error"><i class="ph-fill ph-warning-circle"></i><span id="errorMsg"></span></div>
        <form id="saLoginForm">
          <div class="field">
            <label for="username"><i class="ph-bold ph-user"></i> Usuario</label>
            <input type="text" id="username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password"><i class="ph-bold ph-lock-key"></i> Contraseña</label>
            <input type="password" id="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary btn-block" type="submit" id="btn"><i class="ph-bold ph-sign-in"></i> Entrar</button>
        </form>
        <p class="alt"><a href="/login">Volver al login de tenant</a></p>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('saLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('error');
      errBox.classList.remove('show');
      const btn = document.getElementById('btn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/superadmin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo iniciar sesión');
        location.href = '/superadmin';
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        errBox.classList.add('show');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
